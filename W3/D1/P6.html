<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS: Objects, arrays</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <pre id="out">
    </pre>    
    <button id="runbtn" class="px-3 py-1 rounded-lg m-2 border bg-gray-700 text-white">Run</button>
 
    <script>
        const out =document.getElementById("out");
        function print(...args){

            console.log(...args);
            out.textContent+=args.join(" ")+"\n";
        }
        function clearOut(){
            out.textContent="";
        }
        function run(){
            clearOut();
           let value = "10";
           print("Value= ",value,"typeof= ",typeof value);
            value = 20;
           print("Value= ",value,"typeof= ",typeof value);
           print("'10'+5:", "10"+5);
           print("'10'-5:", "10"-5);   // Numeric conversion

           print("'10'==10:", "10"==10);
            print("'10'===10:", "10"===10);   //if ==,comparision if === for data 

            // data types
            const undefval = undefined;
            const nullval = null;
            print("undefval = ", typeof undefval);
            print("nullval = ", typeof nullval);
        }     
        document.getElementById("runbtn").addEventListener("click",run);
    </script>
</body>
</html>
