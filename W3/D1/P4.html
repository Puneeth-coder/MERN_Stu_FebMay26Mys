<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS: Premitive data types</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <pre id="out">

    </pre>    
    <button id="runbtn" class="px-3 py-1 rounded-lg m-2 border bg-gray-700 text-white">Run</button>
 
    <script>
        const out =document.getElementById("out");
        function print(...args){

            console.log(...args);
            out.textContent+=args.join("")+"\n";
        }
        function clearOut(){
            out.textContent="";
        }
        function run(){
            clearOut();
            
            const name = "Puneeth";
            print("name = ",name, "typeof= ",typeof name);
            const toggeled = true;
            print("toggeled = ",toggeled, "typeof= ",typeof toggeled);
            const number = 92;
             print("number = ",number, "typeof= ",typeof number);
            

        }     
        document.getElementById("runbtn").addEventListener("click",run);
    </script>
</body>
</html>
