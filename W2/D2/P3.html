<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="m-6 space-x-9">
        <input type="text" placeholder="Enter name" class="border border-gray-300 rounded-md px-3 py-2 w-100 peer">
        <p class="text-red-500 mt-2 hidden peer-focus:block">show up wehen input is focused

        </p>
        <input type="checkbox" class="w-5 h-5 appearance-none border border-gray-400 rounded gap-4 
        checked:bg-blue-500 checked:border-red-500 focus:ring-3">
        <input type="radio" class="w-5 h-5 appearance-none border border-gray-400 rounded gap-4 
        checked:bg-blue-500 checked:border-red-500 focus:ring-2 focus:ring-2 focus:ring-blue-500">
    </div>
</body>
</html>
