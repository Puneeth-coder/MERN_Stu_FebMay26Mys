<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex </title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <section class="border p-6 ">
        <h2>Without Flex</h2>
        <div class="border rounded-lg p-4 space-y-9">
            <div class="bg-gray-300 rounded p-3">Logo</div>
            <div class="bg-gray-300 rounded p-3">link</div>
            <div class="bg-gray-300 rounded p-3">contact</div>
        </div>
    </section>
     <section class="border p-6 ">
        <h2>With Flex</h2>
        <div class="border rounded-lg p-4 space-y-4 flex space-x-4">
            <div class="bg-gray-200 rounded p-3">Logo</div>
            <div class="bg-gray-100 rounded p-3">link</div>
            <div class="bg-gray-100 rounded p-3">contact</div>
        </div>
    </section>
</body>
</html>
