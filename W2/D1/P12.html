<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responcive design introduction</title>
    <style>
        .box{
            /* width: 30%; */
            background-color: darkseagreen;
            color: black;
            padding: 20px;
            margin: 10px;
        }
        .container{
            width: 90%;
            margin: auto;
            background-color: brown;
            padding: 20px;
        }
        @media screen and (min-width:600px) {
            .container{
            display:flex;
        }
        }
        .container{
            display:flex;
            justify-content: center;
            .box{
                width: 30%;
            }
        }
            
        
    </style>
</head>
<body>
    <div class="container">
        <div class="box">box 1</div>
        <div class="box">box 2</div>
        <div class="box">box 3</div>
    </div>
</body>
</html>
