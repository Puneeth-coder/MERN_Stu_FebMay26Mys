<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layouts auto-fit and auto-fill</title>
    <style>
        .grid-fr{
            display: grid;
            grid-template-columns:repeat(auto-fit,minmax(100px,1fr)) ; 
            /* grid-template-columns:repeat(auto-fill,minmax(100px,1fr)) ; */
            /* gap:10px; */
            column-gap: 20px;
            margin-top: 10px;
        }
        .grid-fr1{
            display: grid;
            grid-template-columns:repeat(auto-fit,minmax(100px,1fr)) ; 
            /* grid-template-columns:repeat(auto-fill,minmax(100px,1fr)) ; */
            /* gap:10px; */
            column-gap: 20px;
            margin-top: 10px;
        }
        .item{
            background-color: aquamarine;
            color: black;
            padding: 20px;
            column-gap: 10px;
            margin-top: 10px;
        }

    </style>
</head>
<body>
     <!-- -->
     <div class="grid-fr">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
     </div>
     <div class="grid-fr1">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
     </div>
</body>
</html>
